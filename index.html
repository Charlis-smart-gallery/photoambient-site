<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Photo Ambient — Visual Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&family=Syne:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--w:#fff;--off:#f7f6f3;--bd:#e5e0d8;--muted:#999490;--mid:#65605a;--dark:#111009;--accent:#4a7c3f;--serif:"Playfair Display",Georgia,serif;--sans:"Syne",sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--w);color:var(--dark);overflow-x:hidden;}

/* CURSOR */
.cur{width:6px;height:6px;background:var(--dark);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s,background .25s}
.ring{width:28px;height:28px;border:1px solid rgba(17,16,9,.2);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s}
.cur.inv{background:#fff}.ring.inv{border-color:rgba(255,255,255,.35)}

/* LANG BAR */
.langbar{position:fixed;top:0;left:0;right:0;z-index:300;height:28px;background:var(--dark);display:flex;justify-content:flex-end;align-items:center;padding:0 48px;gap:2px}
.lbtn{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);background:none;border:none;;padding:4px 8px;transition:color .25s}
.lbtn.on,.lbtn:hover{color:rgba(255,255,255,.9)}.lsep{color:rgba(255,255,255,.1);font-size:9px}

/* NAV */
nav{position:fixed;top:28px;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;transition:all .4s}
nav.up{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:13px 48px}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{height:44px;width:auto}
.nav-wm{font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fff;transition:color .4s}
nav.up .nav-wm{color:var(--dark)}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:color .3s;}
nav.up .nav-links a{color:var(--muted)}
.nav-links a:hover{color:#fff!important}
nav.up .nav-links a:hover{color:var(--dark)!important}
.nav-cta{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;border:1px solid rgba(255,255,255,.18);padding:8px 20px;transition:all .3s;;white-space:nowrap}
nav.up .nav-cta{color:var(--mid);border-color:var(--bd)}
.nav-cta:hover{background:rgba(255,255,255,.1);color:#fff!important;border-color:rgba(255,255,255,.5)!important}
nav.up .nav-cta:hover{background:var(--dark);color:#fff!important;border-color:var(--dark)!important}

/* HERO */
#hero{height:100vh;min-height:600px;position:relative;overflow:hidden;background:#000}
.hs{position:absolute;inset:0;z-index:1;overflow:hidden}
.hs-slide{position:absolute;inset:0;z-index:1;transform:translateX(100%);transition:none}
.hs-slide.prev{transform:translateX(-100%);transition:transform 1.1s cubic-bezier(.77,0,.175,1);z-index:2}
.hs-slide.active{transform:translateX(0);transition:transform 1.1s cubic-bezier(.77,0,.175,1);z-index:3}
.hs-slide img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.ho{position:absolute;inset:0;z-index:4;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.12) 100%)}
.hc{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(80px,10vw,120px) clamp(20px,5vw,64px) clamp(60px,8vw,100px)}
.htb{max-width:min(640px,92vw)}
.hey{font-size:clamp(8px,1.2vw,10px);font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:clamp(10px,2vw,16px);display:block;transform:translateX(60px);opacity:0;transition:none}
.hhl{font-family:var(--serif);line-height:1.05;transform:translateX(80px);opacity:0;transition:none}
.hl1{display:block;font-size:clamp(24px,4vw,58px);font-weight:300;color:rgba(255,255,255,.8)}
.hl2{display:block;font-size:clamp(24px,4vw,58px);font-weight:900;color:#fff}
.hl3{display:block;font-size:clamp(24px,4vw,58px);font-weight:400;font-style:italic;color:#fff}
.hl4{display:block;font-size:clamp(24px,4vw,58px);font-weight:900;font-style:italic;-webkit-text-stroke:1px rgba(255,255,255,.4);color:transparent}
.hsub{font-size:clamp(8px,1.1vw,10px);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:clamp(10px,2vw,20px);transform:translateX(50px);opacity:0;transition:none}
.hbot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:clamp(14px,2.5vw,28px);transform:translateX(50px);opacity:0;transition:none}
.htb.go .hey{transform:translateX(0);opacity:1;transition:transform .7s .06s cubic-bezier(.25,.46,.45,.94),opacity .7s .06s ease}
.htb.go .hhl{transform:translateX(0);opacity:1;transition:transform .7s .18s cubic-bezier(.25,.46,.45,.94),opacity .7s .18s ease}
.htb.go .hsub{transform:translateX(0);opacity:1;transition:transform .7s .30s cubic-bezier(.25,.46,.45,.94),opacity .7s .30s ease}
.htb.go .hbot{transform:translateX(0);opacity:1;transition:transform .7s .40s cubic-bezier(.25,.46,.45,.94),opacity .7s .40s ease}
.hscr{display:flex;align-items:center;gap:10px}
.hsl{width:36px;height:1px;background:rgba(255,255,255,.2);position:relative;overflow:hidden}
.hsl::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:rgba(255,255,255,.6);animation:sl 1.9s ease infinite}
@keyframes sl{0%{left:-100%}100%{left:100%}}
.hst{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.hcl{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.hcl span{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.1em}
.hcl a{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.5);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.18);padding-bottom:1px;transition:all .3s;}
.hcl a:hover{color:#fff;border-color:rgba(255,255,255,.55)}
.hdots{display:flex;gap:6px;margin-top:clamp(14px,2.5vw,24px)}
.hdot{width:22px;height:2px;background:rgba(255,255,255,.2);;transition:all .35s;position:relative;overflow:hidden}
.hdot.active{background:rgba(255,255,255,.5);width:34px}
.hdotf{position:absolute;top:0;left:0;height:100%;width:0;background:#fff}
/* Marquee inside hero */
.hmq{position:absolute;bottom:3px;left:0;right:0;z-index:7;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);padding:10px 0}
.mq-track{display:flex;white-space:nowrap;animation:mq 28s linear infinite}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq-item{font-family:var(--serif);font-size:11px;font-style:italic;color:rgba(255,255,255,.5);padding:0 28px}
.mq-dot{color:rgba(255,255,255,.2);padding:0 6px}
.hstrip{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#1abc9c,#3498db,#9b59b6,#e74c3c);z-index:8}

/* CLIENT BANNER */
.cl-banner{background:#f7f6f3;padding:14px 48px;display:flex;justify-content:center;align-items:center;gap:16px}
.cl-banner span{font-size:12px;letter-spacing:.08em;color:#999490}
.cl-banner a{font-size:12px;letter-spacing:.1em;color:#111009;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.25);padding-bottom:1px;transition:all .3s;}
.cl-banner a:hover{color:#4a7c3f}

/* GALLERY SECTION */
#work{padding:80px 0 0;background:#ffffff}
.team-intro{padding:0 48px 56px;text-align:center}
.team-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:#999490;display:block;margin-bottom:14px}
.team-ttl{font-family:var(--serif);font-size:clamp(28px,3.5vw,48px);font-weight:700;color:#111009;line-height:1.2;margin-bottom:18px}
.team-ttl em{font-style:italic;font-weight:300;color:#65605a}
.team-txt{font-size:14px;color:#65605a;line-height:1.85;max-width:580px;margin:0 auto}

.cine-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:260px;gap:4px}
.cg{overflow:hidden;position:relative;;background:#111}
.cg:nth-child(1){grid-column:span 2;grid-row:span 2}
.cg:nth-child(5){grid-column:span 2}
.cg:nth-child(7){grid-row:span 2}
.cg img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(30%) brightness(.9);transform:scale(1.06);transition:filter .8s ease,transform 8s ease}
.cg:hover img{filter:grayscale(0%) brightness(1);transform:scale(1)}
.cg-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%);opacity:0;transition:opacity .5s}
.cg:hover .cg-ov{opacity:1}
.cg-info{position:absolute;bottom:0;left:0;right:0;padding:22px 18px 16px;transform:translateY(10px);opacity:0;transition:all .5s .05s}
.cg:hover .cg-info{transform:translateY(0);opacity:1}
.cg-cat{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.6);display:block;margin-bottom:4px}
.cg-title{font-family:var(--serif);font-size:19px;font-weight:400;color:#fff}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:800;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:background .5s}
.lbox.open{background:rgba(0,0,0,.96);pointer-events:all}
.lbox-wrap{max-width:90vw;max-height:88vh;opacity:0;transform:scale(.94);transition:opacity .5s,transform .5s;position:relative}
.lbox.open .lbox-wrap{opacity:1;transform:scale(1)}
.lbox-wrap img{max-width:90vw;max-height:88vh;object-fit:contain;display:block}
.lbox-x{position:fixed;top:20px;right:28px;color:rgba(255,255,255,.4);font-size:24px;;background:none;border:none;z-index:10;transition:color .3s}
.lbox-x:hover{color:#fff}
.lbox-prev,.lbox-next{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);font-size:18px;width:56px;height:56px;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;z-index:810;touch-action:manipulation}
.lbox.open .lbox-prev,.lbox.open .lbox-next{display:flex}
.lbox-prev{left:20px}.lbox-next{right:20px}
.lbox-prev:hover,.lbox-next:hover{background:rgba(255,255,255,.16);color:#fff}
.lbox-cat{position:fixed;top:24px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.4);z-index:10}
.lbox-num{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.3);z-index:10}

/* SERVICES */
#services{padding:96px 0;background:var(--dark)}
.svc-hdr{padding:0 48px;margin-bottom:56px;display:flex;justify-content:space-between;align-items:flex-end}
.sec-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase}
.svc-hdr .sec-lbl{color:#999490}
.sec-ttl{font-family:var(--serif);font-size:clamp(32px,4vw,48px);font-weight:700;line-height:1;margin-top:10px}
.svc-hdr .sec-ttl{color:#fff}
.svc-list{border-top:1px solid rgba(255,255,255,.06)}
.svc-row{display:grid;grid-template-columns:64px 1fr 1.2fr auto;gap:24px;align-items:start;padding:32px 48px;border-bottom:1px solid rgba(255,255,255,.06);transition:background .3s}
.svc-row:hover{background:rgba(255,255,255,.03)}
.svc-n{font-family:var(--serif);font-size:36px;font-weight:300;color:rgba(255,255,255,.1);line-height:1;transition:color .3s}
.svc-row:hover .svc-n{color:rgba(255,255,255,.25)}
.svc-name{font-family:var(--serif);font-size:24px;font-weight:700;color:#fff}
.svc-desc{font-size:13px;color:rgba(255,255,255,.38);line-height:1.85;max-width:340px}
.svc-tags{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.svc-tag{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.08);padding:4px 10px;transition:all .3s}
.svc-row:hover .svc-tag{color:rgba(255,255,255,.45);border-color:rgba(255,255,255,.18)}

/* STUDIO */
#studio{padding:96px 48px;background:var(--off);display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.st-l{position:relative}
.st-main{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.st-logo-box{position:absolute;bottom:-20px;right:-20px;width:46%;background:var(--w);padding:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 32px rgba(0,0,0,.08)}
.st-logo-box img{width:100%;height:auto}
.st-hl{font-family:var(--serif);font-size:clamp(32px,3.5vw,50px);font-weight:700;line-height:1.12;margin:12px 0 24px}
.st-hl em{font-style:italic;font-weight:300}
.st-p{font-size:13px;color:var(--mid);line-height:1.92;margin-bottom:14px}
.st-stats{display:grid;grid-template-columns:repeat(4,1fr);margin-top:44px;border-top:1px solid var(--bd)}
.st-stat{padding:20px 0 0;border-right:1px solid var(--bd)}
.st-stat:last-child{border-right:none}
.st-stat:not(:first-child){padding-left:14px}
.st-n{font-family:var(--serif);font-size:32px;font-weight:700;display:block;line-height:1}
.st-l2{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-top:4px}

/* TESTIMONIALS */
#testimonials{padding:96px 48px;background:var(--w)}
.tst-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px}
.tst-hdr .sec-lbl{color:var(--muted)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd)}
.tc{background:var(--w);padding:36px 28px;transition:background .3s}
.tc:hover{background:var(--off)}
.tq{font-family:var(--serif);font-size:48px;line-height:.35;color:var(--accent);display:block;margin-bottom:16px}
.tt{font-family:var(--serif);font-size:16px;font-style:italic;line-height:1.78;color:var(--mid);margin-bottom:24px}
.ta{display:flex;align-items:center;gap:12px}
.tav{width:36px;height:36px;border-radius:50%;object-fit:cover}
.tn{font-size:11px;font-weight:700;color:var(--dark);display:block}
.tr{font-size:10px;color:var(--muted);display:block;margin-top:1px}

/* CONTACT */
#contact{background:#ffffff;display:grid;grid-template-columns:1fr 1fr}
.ct-l{padding:96px 48px;border-right:1px solid #e5e0d8}
.ct-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:#999490;font-size:clamp(32px,3.5vw,52px);font-weight:700;line-height:1.1;color:#111009;margin:12px 0 16px}
.ct-ttl{color:#111009}.ct-ttl em{font-style:italic;font-weight:300;color:#65605a}
.ct-sub{font-size:13px;color:#65605a;line-height:1.88;max-width:320px}
.ct-info{display:flex;flex-direction:column;gap:20px;margin-top:44px;padding-top:36px;border-top:1px solid #e5e0d8}
.ct-il{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#999490;font-size:16px;color:#111009;margin-top:2px}
.ct-r{padding:96px 48px;display:flex;flex-direction:column;justify-content:center}
.ct-form{display:flex;flex-direction:column;gap:18px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:7px}
.fg label{font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:#999490;border:1px solid #e5e0d8;padding:13px 15px;font-family:var(--sans);font-size:13px;color:#111009;outline:none;transition:border-color .3s;;-webkit-appearance:none;width:100%;border-radius:0}
.fg input::placeholder,.fg textarea::placeholder{color:#999490}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#111009}
.fg select option{background:#111009;color:#ffffff}
.fg textarea{height:100px;resize:none}
.fsub{display:flex;align-items:center;justify-content:space-between;background:#111009;color:#ffffff;border:none;padding:16px 24px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;;transition:all .3s;width:100%}
.fsub:hover{background:#2d2c29;color:#ffffff}
.farr{font-size:16px;transition:transform .3s}
.fsub:hover .farr{transform:translateX(5px)}

/* FOOTER */
footer{background:#ffffff;border-top:1px solid #e5e0d8;padding:22px 48px;display:flex;justify-content:space-between;align-items:center}
.ft-l{display:flex;align-items:center;gap:10px}
.ft-li{height:32px;width:auto;opacity:.8}
.ft-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#999490}
.ft-cp{font-size:10px;color:#999490}
.ft-s{display:flex;gap:20px}
.ft-s a{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#999490;text-decoration:none;transition:color .3s}
.ft-s a:hover{color:#111009}

/* WHATSAPP */
.wa-btn{position:fixed;bottom:28px;right:28px;z-index:600;width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);;transition:transform .3s,box-shadow .3s;text-decoration:none}
.wa-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.55)}
.wa-btn svg{width:28px;height:28px;fill:#fff;position:relative;z-index:1}
.wa-pulse{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(37,211,102,.3);animation:wap 2s ease infinite}
@keyframes wap{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}

/* COOKIE */
.ck{position:fixed;bottom:18px;left:18px;max-width:380px;background:var(--dark);border:1px solid rgba(255,255,255,.08);padding:16px 20px;z-index:700;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(10px);transition:all .5s;pointer-events:none}
.ck.show{opacity:1;transform:translateY(0);pointer-events:all}
.ck-msg{font-size:11px;color:rgba(255,255,255,.4);line-height:1.6;flex:1}
.ck-btns{display:flex;gap:6px;flex-shrink:0}
.cka,.ckd{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:7px 13px;;border:none;transition:all .25s;font-family:var(--sans)}
.cka{background:#111009;color:#ffffff}.ckd{background:none;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)}

/* DIVIDER */
.cdiv{height:2px;background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6)}

/* FADE */
.fu{opacity:1;transform:none}
.fu.vis{opacity:1;transform:none}
.fd{opacity:1;transform:none}
.fd.vis{opacity:1;transform:none}

@media(max-width:900px){
  nav{padding:14px 24px}
  nav.up{padding:12px 24px}
  .nav-links{gap:24px}
  .hc{padding:80px 24px 60px}
  #work{padding:60px 0 0}
  .team-intro{padding:0 24px 40px}
  .cine-grid{grid-template-columns:1fr 1fr;grid-auto-rows:200px}
  .cg:nth-child(n){grid-column:span 1;grid-row:span 1}
  .cg:nth-child(1){grid-column:span 2;grid-row:span 1}
  #studio{grid-template-columns:1fr;gap:40px;padding:60px 24px}
  .st-logo-box{width:40%;bottom:-16px;right:-16px}
  #contact{grid-template-columns:1fr}
  .ct-l{border-right:none;border-bottom:1px solid rgba(255,255,255,.06);padding:60px 24px}
  .ct-r{padding:40px 24px 60px}
  .langbar{padding:0 24px}
  .svc-row{grid-template-columns:48px 1fr;gap:16px;padding:24px}
  .svc-tags{display:none}
  footer{flex-direction:column;gap:16px;padding:24px;text-align:center}
}
.wa-btn{position:fixed;bottom:28px;right:28px;z-index:600;width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);cursor:pointer;transition:transform .3s;text-decoration:none}
.wa-btn:hover{transform:scale(1.1)}
.wa-btn svg{width:28px;height:28px;fill:#fff;position:relative;z-index:1}
.wa-pulse{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(37,211,102,.3);animation:wap 2s ease infinite}
@keyframes wap{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
</style>
</head>
<body>




<!-- LIGHTBOX -->
<div class="lbox" id="lbox">
  <button class="lbox-x" onclick="closeLb()">×</button>
  <button class="lbox-prev" onclick="navLb(-1)">←</button>
  <button class="lbox-next" onclick="navLb(1)">→</button>
  <div class="lbox-wrap"><img id="lbImg" src="" alt=""></div>
  <div class="lbox-cat" id="lbCat"></div>
  <div class="lbox-num" id="lbNum"></div>
</div>

<!-- COOKIE -->
<div class="ck" id="ck">
  <span class="ck-msg" id="ckMsg"></span>
  <div class="ck-btns"><button class="cka" id="cka"></button><button class="ckd" id="ckd"></button></div>
</div>

<!-- LANG -->
<div class="langbar">
  <button class="lbtn on" onclick="setLang('en')">EN</button><span class="lsep">·</span>
  <button class="lbtn" onclick="setLang('pt')">PT</button><span class="lsep">·</span>
  <button class="lbtn" onclick="setLang('es')">ES</button><span class="lsep">·</span>
  <button class="lbtn" onclick="setLang('fr')">FR</button>
</div>

let lang='en', hCur=0, hTmr=null, lbIdx=0;
const HDUR=8000;

// CURSOR


document.querySelectorAll('a,button,.cg,.svc-row,.tc').forEach(el=>{el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2.2)';ring.style.width='40px';ring.style.height='40px'});el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%) scale(1)';ring.style.width='28px';ring.style.height='28px'})});

window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('up',scrollY>60));
function detectLang(){const c=(navigator.language||'en').substring(0,2).toLowerCase();return['pt','es','fr'].includes(c)?c:'en'}
function setLang(l){lang=l;document.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('on',['en','pt','es','fr'][i]===l));document.documentElement.lang=l;renderAll()}

// HERO
function buildHero(){
  const slides=document.querySelectorAll('.hs-slide');
  const dt=document.getElementById('heroDots');
  dt.innerHTML='';
  slides.forEach((s,i)=>{
    const dot=document.createElement('div');
    dot.className='hdot'+(i===0?' active':'');
    dot.innerHTML='<div class="hdotf"></div>';
    dot.onclick=()=>gotoSlide(i);
    dt.appendChild(dot);
  });
  startProg();
  setTimeout(()=>{updateHeroTxt();document.getElementById('heroTb').classList.add('go');},200);
}
function gotoSlide(n){
  if(n===hCur)return;
  clearTimeout(hTmr);
  const slides=document.querySelectorAll('.hs-slide');
  const dots=document.querySelectorAll('.hdot');
  const tb=document.getElementById('heroTb');
  slides[hCur].classList.add('prev');
  slides[hCur].classList.remove('active');
  dots[hCur].classList.remove('active');
  dots[hCur].querySelector('.hdotf').style.cssText='width:0%;transition:none';
  const old=hCur; hCur=n;
  setTimeout(()=>{slides[old].classList.remove('prev');},1200);
  slides[hCur].style.cssText='transform:translateX(100%);transition:none';
  dots[hCur].classList.add('active');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{slides[hCur].style.cssText='';slides[hCur].classList.add('active')}));
  tb.classList.remove('go');
  setTimeout(()=>{updateHeroTxt();},200);
  setTimeout(()=>{tb.classList.add('go');},380);
  startProg();
}
function startProg(){
  const fill=document.querySelectorAll('.hdotf')[hCur];
  if(!fill)return;
  fill.style.cssText='width:0%;transition:none';
  setTimeout(()=>{fill.style.cssText='width:100%;transition:width '+HDUR+'ms linear';},40);
  hTmr=setTimeout(()=>gotoSlide((hCur+1)%HS.length),HDUR);
}
function updateHeroTxt(){
  const s=HS[hCur].lines[lang]||HS[hCur].lines.en;
  document.getElementById('hEy').textContent=s.ey;
  document.getElementById('hl1').textContent=s.l1;
  document.getElementById('hl2').textContent=s.l2;
  document.getElementById('hl3').textContent=s.l3;
  document.getElementById('hl4').textContent=s.l4;
  document.getElementById('hSub').textContent=s.sub;
}

// MARQUEE
function buildMarquee(){
  const items=['Photography','Editorial','Creative Direction','Visual Production','Portraits','Graduation','Sports','Weddings','Corporate','Fashion'];
  let h='';for(let i=0;i<2;i++)items.forEach(it=>{h+='<span class="mq-item">'+it+'</span><span class="mq-dot">·</span>';});
  document.getElementById('mqTrack').innerHTML=h;
}

// LIGHTBOX
function openLb(idx){
  lbIdx=idx;
  const item=GAL[lbIdx];
  const cat=typeof item.cat==='object'?item.cat[lang]:item.cat;
  const img=document.getElementById('lbImg');
  img.style.opacity='0';
  img.src=item.img;
  img.onload=()=>{img.style.transition='opacity .6s';img.style.opacity='1'};
  document.getElementById('lbCat').textContent=cat;
  document.getElementById('lbNum').textContent=(lbIdx+1)+' / '+GAL.length;
  document.getElementById('lbox').classList.add('open');
}
function navLb(dir){lbIdx=(lbIdx+dir+GAL.length)%GAL.length;openLb(lbIdx)}
function closeLb(){document.getElementById('lbox').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();if(e.key==='ArrowRight')navLb(1);if(e.key==='ArrowLeft')navLb(-1)});

// INTERSECTION OBSERVER
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')});},{threshold:.08,rootMargin:'0px 0px -40px 0px'});

// RENDER ALL
function renderAll(){
  const t=T[lang];
  // Hero + Nav
  updateHeroTxt();

  // Studio

  // Testimonials
  document.getElementById('tLbl').textContent=t.tstLabel;
  document.getElementById('tTtl').textContent=t.tstLabel;
  const tg=document.getElementById('tGrid');tg.innerHTML='';
  TST.forEach(ts=>{const el=document.createElement('div');el.className='tc fu';const _txt=typeof ts.text==='object'?ts.text[lang]||ts.text.en:ts.text;const _role=typeof ts.role==='object'?ts.role[lang]||ts.role.en:ts.role;el.innerHTML='<span class="tq">"</span><p class="tt">'+_txt+'</p><div class="ta"><img class="tav" src="'+ts.img+'" alt="'+ts.name+'"><div><span class="tn">'+ts.name+'</span><span class="tr">'+_role+'</span></div></div>';tg.appendChild(el);io.observe(el)});
  // Contact
  document.getElementById('ctLbl').textContent=t.contactLabel;
  document.getElementById('ctTtl').innerHTML=t.contactH+'<br><em>'+t.contactHi+'</em>';
  document.getElementById('ctSub').textContent=t.contactSub;
  const ci=document.getElementById('ctInfo');ci.innerHTML='';
  [CT.email,CT.phone,'+1 (646) 836-4708',CT.location].forEach((v,i)=>{const d=document.createElement('div');d.innerHTML='<div class="ct-il">'+t.infoLabels[i]+'</div><div class="ct-iv">'+v+'</div>';ci.appendChild(d)});
  ['fln','fle','fls','flm'].forEach((id,i)=>{document.getElementById(id).textContent=t.formLabels[i]});
  document.getElementById('fin').placeholder=t.formPH[0];
  document.getElementById('fie').placeholder=t.formPH[1];
  document.getElementById('fim').placeholder=t.formPH[3];
  document.getElementById('fBtn').textContent=t.formBtn;
  const sel=document.getElementById('fis');sel.innerHTML='<option value="">'+t.formPH[2]+'</option>';
  SVC.forEach(s=>{const o=document.createElement('option');o.value=s.name.en;o.textContent=s.name[lang];sel.appendChild(o)});
  // Footer
  document.getElementById('ftTag').textContent=t.footerTagline;
  document.getElementById('ftCp').textContent='© '+new Date().getFullYear()+' Photo Ambient';
  // Cookie
  document.getElementById('ckMsg').textContent=t.cookieMsg;
  document.getElementById('cka').textContent=t.cookieAccept;
  document.getElementById('ckd').textContent=t.cookieDecline;
  // Fade
  document.querySelectorAll('.fu,.fd').forEach(el=>io.observe(el));
}

function handleSubmit(e){e.preventDefault();const b=document.getElementById('fBtn');b.textContent=T[lang].formOk;setTimeout(()=>b.textContent=T[lang].formBtn,3200)}
if(!localStorage.getItem('pa_ck'))setTimeout(()=>document.getElementById('ck').classList.add('show'),2400);

document.querySelectorAll('.fu,.fd').forEach(el=>io.observe(el));

let lbTsX=0;
