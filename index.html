<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --w:#ffffff; --off:#f7f6f3; --light:#f0ede8; --bd:#e5e0d8;
  --muted:#999490; --mid:#65605a; --dark:#111009; --accent:#4a7c3f;
  --serif:'Playfair Display',Georgia,serif; --sans:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--w);color:var(--dark);overflow-x:hidden;cursor:none}

.cur{width:6px;height:6px;background:var(--dark);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s,background .25s}
.ring{width:28px;height:28px;border:1px solid rgba(17,16,9,.2);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}
.cur.inv{background:var(--w)} .ring.inv{border-color:rgba(255,255,255,.3)}

/* LANG */
.langbar{position:fixed;top:0;left:0;right:0;z-index:300;height:28px;background:var(--dark);display:flex;justify-content:flex-end;align-items:center;padding:0 48px;gap:2px}
.lbtn{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.28);background:none;border:none;cursor:none;padding:4px 8px;transition:color .25s}
.lbtn.on,.lbtn:hover{color:rgba(255,255,255,.82)} .lsep{color:rgba(255,255,255,.1);font-size:9px}

/* NAV */
nav{position:fixed;top:28px;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;transition:all .4s}
nav.up{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:13px 48px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-img{height:38px;width:auto;filter:brightness(0) invert(1);transition:filter .4s}
nav.up .nav-logo-img{filter:none}
.nav-wm{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--w);transition:color .4s}
nav.up .nav-wm{color:var(--dark)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:color .3s;cursor:none}
nav.up .nav-links a{color:var(--muted)}
.nav-links a:hover{color:var(--w)!important} nav.up .nav-links a:hover{color:var(--dark)!important}
.nav-cta{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;border:1px solid rgba(255,255,255,.16);padding:8px 18px;transition:all .3s;cursor:none;white-space:nowrap}
nav.up .nav-cta{color:var(--mid);border-color:var(--bd)}
.nav-cta:hover{background:rgba(255,255,255,.1);color:var(--w)!important;border-color:rgba(255,255,255,.45)!important}
nav.up .nav-cta:hover{background:var(--dark);color:var(--w)!important;border-color:var(--dark)!important}

/* HERO */
#hero{min-height:100vh;background:var(--dark);position:relative;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.hero-l{padding:160px 48px 72px;display:flex;flex-direction:column;justify-content:space-between;position:relative;z-index:2}
.hero-eyebrow{font-size:9px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:44px}
.hero-hl{font-family:var(--serif);line-height:1.0}
.hl-fade{display:block;font-size:clamp(50px,6vw,86px);font-weight:700;color:rgba(255,255,255,.15)}
.hl-main{display:block;font-size:clamp(50px,6vw,86px);font-weight:900;color:var(--w)}
.hl-it{display:block;font-size:clamp(50px,6vw,86px);font-weight:700;font-style:italic;color:var(--w)}
.hl-out{display:block;font-size:clamp(50px,6vw,86px);font-weight:900;font-style:italic;-webkit-text-stroke:1px rgba(255,255,255,.35);color:transparent}
.hero-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-top:36px}
.hero-bot{display:flex;justify-content:space-between;align-items:flex-end}
.hero-scroll{display:flex;align-items:center;gap:10px}
.hsl{width:36px;height:1px;background:rgba(255,255,255,.18);position:relative;overflow:hidden}
.hsl::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:rgba(255,255,255,.5);animation:sl 1.9s ease infinite}
@keyframes sl{0%{left:-100%}100%{left:100%}}
.hst{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.hero-cl{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.hero-cl span{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.22)}
.hero-cl a{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.48);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.14);padding-bottom:1px;transition:all .3s;cursor:none}
.hero-cl a:hover{color:var(--w);border-color:rgba(255,255,255,.4)}
.hero-r{position:relative;overflow:hidden;min-height:100vh}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center top;opacity:.88;mix-blend-mode:luminosity;transition:mix-blend-mode .6s,opacity .6s;display:block}
#hero:hover .hero-img{mix-blend-mode:normal;opacity:1}
.hero-strip{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#1abc9c,#3498db,#9b59b6,#e74c3c)}

/* MARQUEE */
.mq-wrap{background:var(--dark);border-top:1px solid rgba(255,255,255,.05);padding:13px 0;overflow:hidden}
.mq-track{display:flex;white-space:nowrap;animation:mq 24s linear infinite}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq-item{font-family:var(--serif);font-size:13px;font-style:italic;color:rgba(255,255,255,.18);padding:0 28px;letter-spacing:.04em}
.mq-dot{color:rgba(255,255,255,.07);padding:0 6px}

/* WORK */
#work{padding:96px 48px;background:var(--w)}
.sec-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:52px}
.sec-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
.sec-ttl{font-family:var(--serif);font-size:46px;font-weight:700;line-height:1;margin-top:10px}
.wgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:8px}
.wi{overflow:hidden;position:relative;cursor:none}
.wi:nth-child(1){grid-column:span 7;grid-row:span 2}
.wi:nth-child(2){grid-column:span 5}
.wi:nth-child(3){grid-column:span 5}
.wi:nth-child(4){grid-column:span 4}
.wi:nth-child(5){grid-column:span 4}
.wi:nth-child(6){grid-column:span 4}
.wi img{width:100%;height:100%;object-fit:cover;min-height:200px;display:block;transition:transform .7s cubic-bezier(.4,0,.2,1)}
.wi:hover img{transform:scale(1.05)}
.wi-info{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.68) 0%,transparent 55%);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:16px 14px 12px}
.wi:hover .wi-info{opacity:1}
.wi-cat{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.52)}
.wi-title{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--w);margin-top:2px}
.wi-year{font-size:10px;color:rgba(255,255,255,.38);margin-top:3px}

/* COLOR DIVIDER */
.cdiv{height:2px;background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6)}

/* SERVICES */
#services{padding:96px 0;background:var(--dark)}
.svc-hdr{padding:0 48px;margin-bottom:60px;display:flex;justify-content:space-between;align-items:flex-end}
.svc-hdr .sec-lbl{color:rgba(255,255,255,.28)} .svc-hdr .sec-ttl{color:var(--w)}
.svc-list{border-top:1px solid rgba(255,255,255,.055)}
.svc-item{display:grid;grid-template-columns:72px 1fr 1fr auto;gap:28px;align-items:start;padding:36px 48px;border-bottom:1px solid rgba(255,255,255,.055);transition:background .3s;cursor:none}
.svc-item:hover{background:rgba(255,255,255,.03)}
.svc-n{font-family:var(--serif);font-size:40px;font-weight:400;color:rgba(255,255,255,.09);line-height:1;transition:color .3s}
.svc-item:hover .svc-n{color:rgba(255,255,255,.22)}
.svc-name{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--w);line-height:1.1}
.svc-desc{font-size:13px;color:rgba(255,255,255,.38);line-height:1.88;max-width:360px}
.svc-tags{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.svc-tag{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.07);padding:4px 10px;transition:all .3s}
.svc-item:hover .svc-tag{color:rgba(255,255,255,.42);border-color:rgba(255,255,255,.16)}

/* STUDIO */
#studio{padding:96px 48px;background:var(--off);display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.st-l{position:relative}
.st-main{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.st-logo-box{position:absolute;bottom:-20px;right:-20px;width:48%;background:var(--w);padding:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 32px rgba(0,0,0,.07)}
.st-logo-box img{width:100%;height:auto}
.st-r{}
.st-hl{font-family:var(--serif);font-size:clamp(36px,3.8vw,54px);font-weight:700;line-height:1.12;margin:12px 0 26px}
.st-hl em{font-style:italic;font-weight:400}
.st-p{font-size:13px;color:var(--mid);line-height:1.92;margin-bottom:14px}
.st-stats{display:grid;grid-template-columns:repeat(4,1fr);margin-top:44px;border-top:1px solid var(--bd)}
.st-stat{padding:20px 0 0;border-right:1px solid var(--bd)}
.st-stat:last-child{border-right:none}
.st-stat:not(:first-child){padding-left:16px}
.st-n{font-family:var(--serif);font-size:34px;font-weight:700;display:block;line-height:1}
.st-l2{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-top:4px}

/* TESTIMONIALS */
#testimonials{padding:96px 48px;background:var(--w)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);margin-top:52px}
.tc{background:var(--w);padding:36px 28px;transition:background .3s}
.tc:hover{background:var(--off)}
.tq{font-family:var(--serif);font-size:48px;line-height:.35;color:var(--accent);margin-bottom:14px;display:block}
.tt{font-family:var(--serif);font-size:16px;font-style:italic;line-height:1.78;color:var(--mid);margin-bottom:24px}
.ta{display:flex;align-items:center;gap:11px}
.tav{width:36px;height:36px;border-radius:50%;object-fit:cover;filter:grayscale(15%)}
.tn{font-size:11px;font-weight:700;color:var(--dark);display:block;letter-spacing:.05em}
.tr{font-size:10px;color:var(--muted);display:block;margin-top:1px}

/* CONTACT */
#contact{background:var(--dark);display:grid;grid-template-columns:1fr 1fr}
.ct-l{padding:96px 48px;border-right:1px solid rgba(255,255,255,.055)}
.ct-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.ct-ttl{font-family:var(--serif);font-size:clamp(36px,3.8vw,54px);font-weight:700;line-height:1.1;color:var(--w);margin:12px 0 18px}
.ct-ttl em{font-style:italic;font-weight:400;color:rgba(255,255,255,.48)}
.ct-sub{font-size:13px;color:rgba(255,255,255,.32);line-height:1.88;max-width:320px}
.ct-info{display:flex;flex-direction:column;gap:20px;margin-top:44px;padding-top:36px;border-top:1px solid rgba(255,255,255,.055)}
.ct-il{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.22)}
.ct-iv{font-family:var(--serif);font-size:16px;color:rgba(255,255,255,.65);margin-top:2px}
.ct-r{padding:96px 48px;display:flex;flex-direction:column;justify-content:center}
.ct-form{display:flex;flex-direction:column;gap:18px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:7px}
.fg label{font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.fg input,.fg textarea,.fg select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:13px 15px;font-family:var(--sans);font-size:13px;color:var(--w);outline:none;transition:border-color .3s;cursor:none;-webkit-appearance:none;width:100%;border-radius:0}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(255,255,255,.18)}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:rgba(255,255,255,.28)}
.fg select option{background:#1a1916}
.fg textarea{height:96px;resize:none}
.fsub{display:flex;align-items:center;justify-content:space-between;background:var(--w);color:var(--dark);border:none;padding:16px 24px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;cursor:none;transition:all .3s;width:100%}
.fsub:hover{background:rgba(255,255,255,.88)}
.farr{font-size:16px;transition:transform .3s}
.fsub:hover .farr{transform:translateX(5px)}

/* FOOTER */
footer{background:var(--dark);border-top:1px solid rgba(255,255,255,.05);padding:22px 48px;display:flex;justify-content:space-between;align-items:center}
.ft-l{display:flex;align-items:center;gap:10px}
.ft-li{height:26px;width:auto;filter:brightness(0) invert(1);opacity:.5}
.ft-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.ft-cp{font-size:10px;color:rgba(255,255,255,.16)}
.ft-s{display:flex;gap:18px}
.ft-s a{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.22);text-decoration:none;transition:color .3s;cursor:none}
.ft-s a:hover{color:rgba(255,255,255,.65)}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
.lbox.open{opacity:1;pointer-events:all}
.lbox img{max-width:88vw;max-height:88vh;object-fit:contain}
.lbox-x{position:absolute;top:18px;right:26px;color:rgba(255,255,255,.38);font-size:22px;cursor:none;background:none;border:none;transition:color .3s}
.lbox-x:hover{color:var(--w)}

/* COOKIE */
.ck{position:fixed;bottom:18px;left:18px;max-width:400px;background:var(--dark);border:1px solid rgba(255,255,255,.07);padding:16px 20px;z-index:400;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(10px);transition:all .5s;pointer-events:none}
.ck.show{opacity:1;transform:translateY(0);pointer-events:all}
.ck-msg{font-size:11px;color:rgba(255,255,255,.4);line-height:1.6;flex:1}
.ck-btns{display:flex;gap:6px;flex-shrink:0}
.cka,.ckd{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:7px 13px;cursor:none;border:none;transition:all .25s;font-family:var(--sans)}
.cka{background:var(--w);color:var(--dark)}
.ckd{background:none;color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.09)}

/* FADE */
.fu{opacity:0;transform:translateY(22px);transition:opacity .72s ease,transform .72s ease}
.fu.vis{opacity:1;transform:none}
.fd{opacity:0;transform:translateY(22px);transition:opacity .72s ease .14s,transform .72s ease .14s}
.fd.vis{opacity:1;transform:none}
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="ring" id="ring"></div>
<div class="lbox" id="lbox"><button class="lbox-x" onclick="closeLb()">×</button><img id="lbImg" src="" alt=""></div>
<div class="ck" id="ck"><span class="ck-msg" id="ckMsg"></span><div class="ck-btns"><button class="cka" id="cka"></button><button class="ckd" id="ckd"></button></div></div>

<script>
// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function tick(){cur.style.left=mx+'px';cur.style.top=my+'px';rx+=(mx-rx)*.09;ry+=(my-ry)*.09;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick)})();
document.addEventListener('mousemove',()=>{
  const el=document.elementFromPoint(mx,my);
  const dark=el&&el.closest('#hero,#services,#contact,footer,.mq-wrap,.lbox');
  cur.classList.toggle('inv',!!dark);ring.classList.toggle('inv',!!dark);
});
document.querySelectorAll('a,button,.wi,.svc-item,.tc').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2.4)';ring.style.width='42px';ring.style.height='42px'});
  el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%) scale(1)';ring.style.width='28px';ring.style.height='28px'});
});

window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('up',scrollY>60));

let lang='en';
function detectLang(){const c=(navigator.language||'en').substring(0,2).toLowerCase();return['pt','es','fr'].includes(c)?c:'en'}
function setLang(l){lang=l;document.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('on',['en','pt','es','fr'][i]===l));document.documentElement.lang=l;renderAll()}

function buildMarquee(){
  const items=["Photography","Editorial","Creative Direction","Visual Production","Portraits","Events","Fashion","Brand Identity"];
  let h='';for(let i=0;i<2;i++)items.forEach(it=>{h+=`<span class="mq-item">${it}</span><span class="mq-dot">·</span>`});
  document.getElementById('mqTrack').innerHTML=h;
}

function renderHeroNav(){
  const t=T[lang];
  document.getElementById('hEyebrow').textContent=t.heroEyebrow;
  document.getElementById('hl1').textContent=t.heroLine1;
  document.getElementById('hl2').textContent=t.heroLine2;
  document.getElementById('hl3').textContent=t.heroLine3;
  document.getElementById('hl4').textContent=t.heroLine4;
  document.getElementById('hSub').textContent=t.heroSub;
  document.getElementById('hScroll').textContent=t.scrollHint;
  document.getElementById('hClLbl').textContent=t.clientLabel;
  document.getElementById('hClLink').textContent=t.clientLink;
  const nl=document.getElementById('navLinks');nl.innerHTML='';
  const anch=['#work','#services','#studio','#contact'];
  t.nav.forEach((n,i)=>{const li=document.createElement('li');li.innerHTML=`<a href="${anch[i]}">${n}</a>`;nl.appendChild(li)});
  document.getElementById('navCta').textContent=t.clientBtn;
}

function renderWork(){
  const t=T[lang];
  document.getElementById('wLbl').textContent=t.workLabel;
  document.getElementById('wTtl').textContent=t.workLabel;
  const g=document.getElementById('wGrid');g.innerHTML='';
  SITE.gallery.forEach(item=>{
    const el=document.createElement('div');el.className='wi';
    el.innerHTML=`<img src="${item.img}" alt="${item.title}" loading="lazy"><div class="wi-info"><div class="wi-cat">${item.cat}</div><div class="wi-title">${item.title}</div><div class="wi-year">${item.year}</div></div>`;
    el.onclick=()=>openLb(item.img);g.appendChild(el);
  });
}

function renderServices(){
  const t=T[lang];
  document.getElementById('sLbl').textContent=t.servicesLabel;
  document.getElementById('sTtl').textContent=t.servicesLabel;
  const list=document.getElementById('svcList');list.innerHTML='';
  SITE.services.forEach(s=>{
    const el=document.createElement('div');el.className='svc-item fu';
    el.innerHTML=`<div class="svc-n">${s.num}</div><div class="svc-name">${s.name[lang]}</div><div class="svc-desc">${s.desc[lang]}</div><div class="svc-tags">${s.tags.map(tg=>`<span class="svc-tag">${tg}</span>`).join('')}</div>`;
    list.appendChild(el);io.observe(el);
  });
}

function renderStudio(){
  const t=T[lang];
  document.getElementById('stLbl').textContent=t.studioLabel;
  document.getElementById('stHl').innerHTML=t.studioH1+'<br><em>'+t.studioH1i+'</em>';
  document.getElementById('stP1').textContent=t.studioP1;
  document.getElementById('stP2').textContent=t.studioP2;
  const st=document.getElementById('stStats');st.innerHTML='';
  SITE.stats.forEach(s=>{const el=document.createElement('div');el.className='st-stat';el.innerHTML=`<span class="st-n">${s.n}</span><span class="st-l2">${s.l[lang]}</span>`;st.appendChild(el)});
}

function renderTestimonials(){
  const t=T[lang];
  document.getElementById('tLbl').textContent=t.tstLabel;
  document.getElementById('tTtl').textContent=t.tstLabel;
  const g=document.getElementById('tGrid');g.innerHTML='';
  SITE.testimonials.forEach(ts=>{
    const el=document.createElement('div');el.className='tc fu';
    el.innerHTML=`<span class="tq">"</span><p class="tt">${ts.text}</p><div class="ta"><img class="tav" src="${ts.img}" alt="${ts.name}"><div><span class="tn">${ts.name}</span><span class="tr">${ts.role}</span></div></div>`;
    g.appendChild(el);io.observe(el);
  });
}

function renderContact(){
  const t=T[lang];
  document.getElementById('ctLbl').textContent=t.contactLabel;
  document.getElementById('ctTtl').innerHTML=t.contactH+'<br><em>'+t.contactHi+'</em>';
  document.getElementById('ctSub').textContent=t.contactSub;
  const ci=document.getElementById('ctInfo');ci.innerHTML='';
  const vals=[SITE.contact.email,SITE.contact.phone,SITE.contact.instagram,SITE.contact.location];
  t.infoLabels.forEach((l,i)=>{const d=document.createElement('div');d.innerHTML=`<div class="ct-il">${l}</div><div class="ct-iv">${vals[i]}</div>`;ci.appendChild(d)});
  document.getElementById('fln').textContent=t.formName;
  document.getElementById('fle').textContent=t.formEmail;
  document.getElementById('fls').textContent=t.formService;
  document.getElementById('flm').textContent=t.formMsg;
  document.getElementById('fBtn').textContent=t.formBtn;
  document.getElementById('fin').placeholder=t.formName;
  document.getElementById('fie').placeholder=t.formEmail;
  document.getElementById('fim').placeholder=t.formMsg+'...';
  const sel=document.getElementById('fis');sel.innerHTML=`<option value="">${t.formService}</option>`;
  SITE.services.forEach(s=>{const o=document.createElement('option');o.value=s.name.en;o.textContent=s.name[lang];sel.appendChild(o)});
}

function handleSubmit(e){e.preventDefault();const b=document.getElementById('fBtn');b.textContent=T[lang].formOk;setTimeout(()=>b.textContent=T[lang].formBtn,3200)}

function renderFooter(){document.getElementById('ftTag').textContent=T[lang].footerTagline;document.getElementById('ftCp').textContent=`© ${new Date().getFullYear()} Photo Ambient`}

function renderCookie(){const t=T[lang];document.getElementById('ckMsg').textContent=t.cookieMsg;document.getElementById('cka').textContent=t.cookieAccept;document.getElementById('ckd').textContent=t.cookieDecline}
if(!localStorage.getItem('pa_ck'))setTimeout(()=>document.getElementById('ck').classList.add('show'),2400);
document.getElementById('cka').addEventListener('click',()=>{localStorage.setItem('pa_ck','1');document.getElementById('ck').classList.remove('show')});
document.getElementById('ckd').addEventListener('click',()=>{localStorage.setItem('pa_ck','0');document.getElementById('ck').classList.remove('show')});

function openLb(src){document.getElementById('lbImg').src=src;document.getElementById('lbox').classList.add('open')}
function closeLb(){document.getElementById('lbox').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb()});

const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')})},{threshold:.08,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.fu,.fd').forEach(el=>io.observe(el));

function renderAll(){renderHeroNav();renderWork();renderServices();renderStudio();renderTestimonials();renderContact();renderFooter();renderCookie();document.querySelectorAll('.fu,.fd').forEach(el=>io.observe(el))}

lang=detectLang();
document.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('on',['en','pt','es','fr'][i]===lang));
buildMarquee();
renderAll();
</script>
</body>
</html>
