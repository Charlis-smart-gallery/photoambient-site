<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PhotoAmbient — Visual Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&family=Syne:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Syne",sans-serif;background:#fff;color:#111009;overflow-x:hidden}
.langbar{position:fixed;top:0;left:0;right:0;z-index:300;height:28px;background:#111009;display:flex;justify-content:flex-end;align-items:center;padding:0 48px;gap:2px}
.lbtn{font-family:"Syne",sans-serif;font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);background:none;border:none;padding:4px 8px;transition:color .25s;cursor:pointer}
.lbtn.on,.lbtn:hover{color:rgba(255,255,255,.9)}.lsep{color:rgba(255,255,255,.1);font-size:9px}
nav{position:fixed;top:28px;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;transition:all .4s}
nav.up{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid #e5e0d8;padding:13px 48px}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo img{height:40px;width:auto}
.nav-wm{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fff;transition:color .4s;white-space:nowrap}
nav.up .nav-wm{color:#111009}
.nav-links{display:flex;gap:48px;list-style:none;margin:0 auto}
.nav-links a{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:color .3s}
nav.up .nav-links a{color:#999490}
.nav-links a:hover{color:#fff!important}
nav.up .nav-links a:hover{color:#111009!important}
.nav-cta{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;border:1px solid rgba(255,255,255,.18);padding:8px 20px;transition:all .3s;white-space:nowrap}
nav.up .nav-cta{color:#65605a;border-color:#e5e0d8}
.nav-cta:hover{background:rgba(255,255,255,.1);color:#fff!important}
nav.up .nav-cta:hover{background:#111009;color:#fff!important;border-color:#111009!important}
#hero{height:100vh;min-height:600px;position:relative;overflow:hidden;background:#000}
.hs{position:absolute;inset:0;z-index:1;overflow:hidden}
.hs-slide{position:absolute;inset:0;z-index:1;transform:translateX(100%);transition:none}
.hs-slide.prev{transform:translateX(-100%);transition:transform 1.1s cubic-bezier(.77,0,.175,1);z-index:2}
.hs-slide.active{transform:translateX(0);transition:transform 1.1s cubic-bezier(.77,0,.175,1);z-index:3}
.hs-slide img{width:100%;height:100%;object-fit:cover;display:block}
.ho{position:absolute;inset:0;z-index:4;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.12) 100%)}
.hc{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(80px,10vw,120px) clamp(20px,5vw,64px) clamp(60px,8vw,100px)}
.htb{max-width:min(640px,92vw)}
.hey{font-size:10px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px;display:block}
.hhl{font-family:"Playfair Display",serif;line-height:1.05}
.hl1{display:block;font-size:clamp(24px,4vw,58px);font-weight:300;color:rgba(255,255,255,.8)}
.hl2{display:block;font-size:clamp(24px,4vw,58px);font-weight:900;color:#fff}
.hl3{display:block;font-size:clamp(24px,4vw,58px);font-weight:400;font-style:italic;color:#fff}
.hl4{display:block;font-size:clamp(24px,4vw,58px);font-weight:900;font-style:italic;-webkit-text-stroke:1px rgba(255,255,255,.4);color:transparent}
.hsub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:16px}
.hdots{display:flex;gap:6px;margin-top:24px}
.hdot{width:24px;height:2px;background:rgba(255,255,255,.2);transition:all .35s;position:relative;overflow:hidden;cursor:pointer;touch-action:manipulation}
.hdot.active{background:rgba(255,255,255,.5);width:36px}
.hdotf{position:absolute;top:0;left:0;height:100%;width:0;background:#fff}
.hmq{position:absolute;bottom:3px;left:0;right:0;z-index:6;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);padding:9px 0}
.mq-track{display:flex;white-space:nowrap;animation:mqanim 28s linear infinite}
@keyframes mqanim{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq-item{font-family:"Playfair Display",serif;font-size:11px;font-style:italic;color:rgba(255,255,255,.5);padding:0 28px}
.mq-sep{color:rgba(255,255,255,.2);padding:0 6px}
.hstrip{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6);z-index:7}
.cl-banner{background:#f7f6f3;padding:12px 48px;display:flex;justify-content:center;align-items:center;gap:12px;border-bottom:1px solid #e5e0d8}
.cl-banner span{font-size:12px;color:#999490}
.cl-banner a{font-size:12px;color:#111009;text-decoration:none;border-bottom:1px solid #e5e0d8;padding-bottom:1px}
#work{padding:80px 0 0;background:#fff}
.team-intro{padding:0 48px 56px;text-align:center}
.team-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:#999490;display:block;margin-bottom:14px}
.team-ttl{font-family:"Playfair Display",serif;font-size:clamp(28px,3.5vw,48px);font-weight:700;color:#111009;line-height:1.2;margin-bottom:18px}
.team-ttl em{font-style:italic;font-weight:300;color:#65605a}
.team-txt{font-size:14px;color:#65605a;line-height:1.85;max-width:580px;margin:0 auto}
.cine-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:260px;gap:4px}
.cg{position:relative;overflow:hidden;cursor:pointer;background:#111}
.cg:nth-child(1){grid-column:span 2;grid-row:span 2}
.cg img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(30%) brightness(.9);transition:all .8s ease}
.cg:hover img{filter:grayscale(0%) brightness(1);transform:scale(1.04)}
.cg-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%);opacity:0;transition:opacity .5s}
.cg:hover .cg-ov{opacity:1}
.cg-info{position:absolute;bottom:0;left:0;right:0;padding:22px 18px 16px;transform:translateY(10px);opacity:0;transition:all .5s}
.cg:hover .cg-info{transform:translateY(0);opacity:1}
.cg-cat{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.6);display:block;margin-bottom:4px}
.cg-title{font-family:"Playfair Display",serif;font-size:19px;font-weight:400;color:#fff}
.lbox{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:800;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:background .5s}
.lbox.open{background:rgba(0,0,0,.96);pointer-events:all}
.lbox-wrap{max-width:90vw;max-height:88vh;opacity:0;transform:scale(.94);transition:opacity .5s,transform .5s}
.lbox.open .lbox-wrap{opacity:1;transform:scale(1)}
.lbox-wrap img{max-width:90vw;max-height:88vh;object-fit:contain;display:block}
.lbox-x{position:fixed;top:20px;right:28px;color:rgba(255,255,255,.4);font-size:24px;background:none;border:none;z-index:10;cursor:pointer}
.lbox-prev,.lbox-next{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);font-size:20px;width:48px;height:48px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:810;touch-action:manipulation}
.lbox.open .lbox-prev,.lbox.open .lbox-next{display:flex}
.lbox-prev{left:16px}.lbox-next{right:16px}
.lbox-num{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4);z-index:10}
#testimonials{padding:96px 48px;background:#fff}
.tst-hdr{margin-bottom:48px}
.sec-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:#999490}
.sec-ttl{font-family:"Playfair Display",serif;font-size:clamp(32px,4vw,48px);font-weight:700;line-height:1;margin-top:10px;color:#111009}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e5e0d8}
.tc{background:#fff;padding:36px 28px;transition:background .3s}
.tc:hover{background:#f7f6f3}
.tq{font-family:"Playfair Display",serif;font-size:48px;line-height:.35;color:#4a7c3f;display:block;margin-bottom:16px}
.tt{font-family:"Playfair Display",serif;font-size:16px;font-style:italic;line-height:1.78;color:#65605a;margin-bottom:24px}
.ta{display:flex;align-items:center;gap:12px}
.tav{width:36px;height:36px;border-radius:50%;object-fit:cover}
.tn{font-size:11px;font-weight:700;color:#111009;display:block}
.tr{font-size:10px;color:#999490;display:block;margin-top:1px}
#contact{background:#fff;display:grid;grid-template-columns:1fr 1fr}
.ct-l{padding:96px 48px;border-right:1px solid #e5e0d8}
.ct-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:#999490;margin-bottom:12px;display:block}
.ct-ttl{font-family:"Playfair Display",serif;font-size:clamp(32px,3.5vw,52px);font-weight:700;line-height:1.1;color:#111009;margin-bottom:16px}
.ct-ttl em{font-style:italic;font-weight:300;color:#65605a}
.ct-sub{font-size:13px;color:#65605a;line-height:1.88;max-width:320px}
.ct-info{display:flex;flex-direction:column;gap:20px;margin-top:44px;padding-top:36px;border-top:1px solid #e5e0d8}
.ct-il{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#999490;display:block}
.ct-iv{font-family:"Playfair Display",serif;font-size:16px;color:#111009;margin-top:2px;display:block}
.ct-r{padding:96px 48px;display:flex;flex-direction:column;justify-content:center}
.ct-form{display:flex;flex-direction:column;gap:18px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:7px}
.fg label{font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:#999490}
.fg input,.fg textarea,.fg select{padding:13px 15px;font-family:"Syne",sans-serif;font-size:13px;color:#111009;background:#f9f8f6;border:1px solid #e5e0d8;outline:none;transition:border-color .3s;width:100%;border-radius:0;-webkit-appearance:none}
.fg input::placeholder,.fg textarea::placeholder{color:#999490}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#111009}
.fg select option{background:#fff;color:#111009}
.fg textarea{height:100px;resize:none}
.fsub{display:flex;align-items:center;justify-content:space-between;background:#111009;color:#fff;border:none;padding:16px 24px;font-family:"Syne",sans-serif;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;transition:all .3s;width:100%;cursor:pointer}
.fsub:hover{background:#2d2c29}
footer{background:#fff;border-top:1px solid #e5e0d8;padding:22px 48px;display:flex;justify-content:space-between;align-items:center}
.ft-l{display:flex;align-items:center;gap:10px}
.ft-l img{height:28px;width:auto;opacity:.8}
.ft-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#999490}
.ft-cp{font-size:10px;color:#999490}
.ft-s{display:flex;gap:20px}
.ft-s a{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#999490;text-decoration:none}
.ft-s a:hover{color:#111009}
.wa-btn{position:fixed;bottom:28px;right:28px;z-index:600;width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);cursor:pointer;transition:transform .3s;text-decoration:none}
.wa-btn:hover{transform:scale(1.1)}
.wa-btn svg{width:28px;height:28px;fill:#fff}
.wa-pulse{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(37,211,102,.3);animation:wap 2s ease infinite}
@keyframes wap{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
.ck{position:fixed;bottom:18px;left:18px;max-width:380px;background:#111009;border:1px solid rgba(255,255,255,.1);padding:16px 20px;z-index:700;display:none;align-items:center;gap:12px}
.ck.show{display:flex}
.ck-msg{font-size:11px;color:rgba(255,255,255,.5);flex:1;line-height:1.6}
.ck-btns{display:flex;gap:6px}
.cka,.ckd{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:7px 13px;cursor:pointer;border:none;font-family:"Syne",sans-serif}
.cka{background:#fff;color:#111009}.ckd{background:none;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15)}
@media(max-width:900px){
  nav{padding:14px 24px}.nav-links{gap:24px}
  .hc{padding:60px 24px 80px}
  #work{padding:60px 0 0}.team-intro{padding:0 24px 40px}
  .cine-grid{grid-template-columns:1fr 1fr;grid-auto-rows:180px}
  .cg:nth-child(1){grid-column:span 2;grid-row:span 1}
  #testimonials{padding:60px 24px}.tgrid{grid-template-columns:1fr}
  #contact{grid-template-columns:1fr}.ct-l{border-right:none;border-bottom:1px solid #e5e0d8;padding:60px 24px}.ct-r{padding:40px 24px 60px}
  footer{flex-direction:column;gap:12px;padding:20px;text-align:center}
  .langbar{padding:0 24px}
}
</style>
</head>
<body>

<div class="lbox" id="lbox">
  <button class="lbox-x" onclick="closeLb()">&#215;</button>
  <button class="lbox-prev" onclick="navLb(-1)">&#8249;</button>
  <button class="lbox-next" onclick="navLb(1)">&#8250;</button>
  <div class="lbox-wrap"><img id="lbImg" src=""></div>
  <div class="lbox-num" id="lbNum"></div>
</div>

<div class="ck" id="ck">
  <span class="ck-msg" id="ckMsg"></span>
  <div class="ck-btns"><button class="cka" id="cka"></button><button class="ckd" id="ckd"></button></div>
</div>

<div class="langbar">
  <button class="lbtn on" onclick="setLang('en')">EN</button><span class="lsep">&#183;</span>
  <button class="lbtn" onclick="setLang('pt')">PT</button><span class="lsep">&#183;</span>
  <button class="lbtn" onclick="setLang('es')">ES</button><span class="lsep">&#183;</span>
  <button class="lbtn" onclick="setLang('fr')">FR</button>
</div>

let lang="en",hCur=0,hTmr=null,lbIdx=0;
const HDUR=8000;

function detectLang(){const langs=navigator.languages||[navigator.language||"en"];for(const l of langs){const c=l.toLowerCase().substring(0,2);if(["pt","es","fr"].includes(c))return c;}return "en";}
function setLang(l){lang=l;document.querySelectorAll(".lbtn").forEach((b,i)=>b.classList.toggle("on",["en","pt","es","fr"][i]===l));document.documentElement.lang=l;renderAll();}

function buildHero(){
  const dt=document.getElementById("heroDots");dt.innerHTML="";
  HS.forEach((_,i)=>{
    const dot=document.createElement("div");dot.className="hdot"+(i===0?" active":"");
    dot.innerHTML="<div class='hdotf'></div>";
    dot.onclick=()=>gotoSlide(i);
    dt.appendChild(dot);
  });
  startProg();updateHeroTxt();
}

function gotoSlide(n){
  if(n===hCur)return;clearTimeout(hTmr);
  const slides=document.querySelectorAll(".hs-slide");
  const dots=document.querySelectorAll(".hdot");
  slides[hCur].classList.add("prev");slides[hCur].classList.remove("active");
  dots[hCur].classList.remove("active");
  dots[hCur].querySelector(".hdotf").style.cssText="width:0;transition:none";
  const old=hCur;hCur=n;
  setTimeout(()=>slides[old].classList.remove("prev"),1200);
  slides[hCur].style.cssText="transform:translateX(100%);transition:none";
  dots[hCur].classList.add("active");
  requestAnimationFrame(()=>requestAnimationFrame(()=>{slides[hCur].style.cssText="";slides[hCur].classList.add("active");}));
  updateHeroTxt();startProg();
}

function startProg(){
  const fill=document.querySelectorAll(".hdotf")[hCur];if(!fill)return;
  fill.style.cssText="width:0;transition:none";
  setTimeout(()=>{fill.style.cssText="width:100%;transition:width "+HDUR+"ms linear";},30);
  hTmr=setTimeout(()=>gotoSlide((hCur+1)%HS.length),HDUR);
}

function updateHeroTxt(){
  const s=HS[hCur].lines[lang]||HS[hCur].lines.en;
  document.getElementById("hEy").textContent=s.ey;
  document.getElementById("hl1").textContent=s.l1;
  document.getElementById("hl2").textContent=s.l2;
  document.getElementById("hl3").textContent=s.l3;
  document.getElementById("hl4").textContent=s.l4;
  document.getElementById("hSub").textContent=s.sub;
}

function buildMarquee(){
  const items=["Photography","Editorial","Creative Direction","Portraits","Graduation","Sports","Weddings","Corporate"];
  let h="";for(let i=0;i<2;i++)items.forEach(it=>{h+="<span class='mq-item'>"+it+"</span><span class='mq-sep'>·</span>";});
  document.getElementById("mqTrack").innerHTML=h;
}

function openLb(i){lbIdx=i;document.getElementById("lbImg").src=GAL[i].img;document.getElementById("lbNum").textContent=(i+1)+" / "+GAL.length;document.getElementById("lbox").classList.add("open");}
function navLb(d){lbIdx=(lbIdx+d+GAL.length)%GAL.length;openLb(lbIdx);}
function closeLb(){document.getElementById("lbox").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();if(e.key==="ArrowRight")navLb(1);if(e.key==="ArrowLeft")navLb(-1);});

let tsX=0;
document.getElementById("hero").addEventListener("touchstart",e=>{tsX=e.touches[0].clientX;},{passive:true});
document.getElementById("hero").addEventListener("touchend",e=>{const d=tsX-e.changedTouches[0].clientX;if(Math.abs(d)>50)gotoSlide(d>0?(hCur+1)%HS.length:(hCur-1+HS.length)%HS.length);},{passive:true});
document.getElementById("lbox").addEventListener("touchstart",e=>{tsX=e.touches[0].clientX;},{passive:true});
document.getElementById("lbox").addEventListener("touchend",e=>{const d=tsX-e.changedTouches[0].clientX;if(Math.abs(d)>50)navLb(d>0?1:-1);},{passive:true});

  ["Weddings","Portraits","Events & Sports","Commercial","Editorial"].forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;fs.appendChild(o);});

  document.getElementById("ftCp").textContent="2026 PhotoAmbient";

  document.getElementById("cka").textContent=t.accept;
  document.getElementById("ckd").textContent=t.decline;
}

function handleSubmit(e){e.preventDefault();const b=document.getElementById("fBtn");const orig=b.textContent;b.textContent=T[lang].formOk;setTimeout(()=>b.textContent=orig,3000);}
if(!localStorage.getItem("pa_ck"))setTimeout(()=>document.getElementById("ck").classList.add("show"),2400);
document.getElementById("cka").addEventListener("click",()=>{localStorage.setItem("pa_ck","1");document.getElementById("ck").classList.remove("show");});
document.getElementById("ckd").addEventListener("click",()=>{localStorage.setItem("pa_ck","0");document.getElementById("ck").classList.remove("show");});

lang=detectLang();
document.querySelectorAll(".lbtn").forEach((b,i)=>b.classList.toggle("on",["en","pt","es","fr"][i]===lang));
document.documentElement.lang=lang;
buildMarquee();
buildHero();
renderAll();
